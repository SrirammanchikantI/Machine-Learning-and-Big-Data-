name: ml_bigdata
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - openjdk=11           # Required by PySpark
  - pip
  - pip:
    - pyspark==3.5.0
    - numpy
    - pandas
    - scikit-learn
    - matplotlib
    - seaborn
    - jupyter
    - notebook
    - pyyaml
